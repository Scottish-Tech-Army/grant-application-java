<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>

    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: 12px;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .page {
            max-width: 820px;
            margin: 30px auto;
            background: #ffffff;
            padding: 36px 40px;
            border-radius: 10px;
        }

        /* Header */
        .header {
            border-bottom: 2px solid #2d6cdf;
            margin-bottom: 28px;
            padding-bottom: 12px;
        }

        .header h1 {
            margin: 0;
            font-size: 22px;
            color: #2d6cdf;
            text-align: center;
        }

        .meta {
            margin-top: 12px;
            width: 100%;
            font-size: 12px;
        }

        .meta span {
            display: inline-block;
            margin-right: 20px;
        }

        /* Section title */
        h3 {
            margin-top: 30px;
            margin-bottom: 14px;
            color: #1a3a5d;
            font-size: 15px;
            border-left: 4px solid #2d6cdf;
            padding-left: 8px;
        }

        /* QA block */
        .qa {
            margin-bottom: 16px;
            page-break-inside: avoid;
        }

        .question {
            font-weight: bold;
            color: #333;
            margin-bottom: 4px;
        }

        .answer {
            background: #f1f5fb;
            border-left: 4px solid #2d6cdf;
            padding: 8px 12px;
            border-radius: 4px;
            line-height: 1.5;
        }

        /* Footer */
        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 10px;
            color: #777;
        }
    </style>
</head>

<body>

<div class="page">

    <!-- HEADER -->
    <div class="header">
        <h1 th:text="${application.name}">Application Name</h1>

        <div class="meta">
            <span><b>Funder:</b> <span th:text="${application.funderName}"></span></span>
            <span><b>Status:</b> <span th:text="${application.status}"></span></span>
            <span><b>Created:</b> <span th:text="${application.createDate}"></span></span>
        </div>
    </div>

    <!-- FIELDS LIST -->
    <h3>Application Fields</h3>

    <div th:if="${#lists.isEmpty(fields)}">
        <i>No fields available</i>
    </div>

    <div th:each="f : ${fields}" class="qa">
        <div class="question" th:text="${f.fieldKey}">Field name</div>
        <div class="answer"
             th:text="${f.versions[T(java.lang.String).valueOf(f.currentVersion)].value}">
            Field value
        </div>
    </div>

    <!-- QUESTIONS LIST -->
    <h3>Application Questions</h3>

    <div th:if="${#lists.isEmpty(questions)}">
        <i>No questions available</i>
    </div>

    <div th:each="q : ${questions}" class="qa">
        <div class="question" th:text="${q.fieldKey}">Question</div>
        <div class="answer"
             th:text="${q.versions[T(java.lang.String).valueOf(q.currentVersion)].value}">
            Answer
        </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        Generated by EZGrant • Confidential
    </div>

</div>

</body>
</html>
